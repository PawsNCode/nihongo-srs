<title>Nihongo SRS — Japanese</title>
<style>html,body{margin:0;padding:0;background:#f1e7d4;}#root{min-height:100vh;}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ============================================================
   Nihongo SRS — Japanese (Masri-style SRS, rebuilt for 日本語)
   WaniKani-style levels + SRS stages, lessons & reviews,
   romaji-typed answers with live kana conversion, plus a
   hiragana / katakana Script trainer (chart, quiz, trace).
   ============================================================ */

const STORE_KEY = "nihongo-wk-v1";

/* ---- Theme: sumi ink + indigo (藍) + vermilion (朱) on washi paper ---- */
const T = {
  bg: "#fff4fb",
  bg2: "#ffffff",
  panel: "#ffffff",
  panelHi: "#fdeef5",
  line: "#f1dce7",
  gold: "#801d5c",
  goldSoft: "#c02e80",
  terra: "#c02e80",
  text: "#34232d",
  textDim: "#9c8a93",
  green: "#801d5c",
  amber: "#af8a8f",
  red: "#b23a5e",
  blue: "#c02e80",
  pink: "#cd81a9",
};

const jaFont =
  '"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","Shippori Mincho","Songti SC",serif';
const displayFont = '"Hiragino Mincho ProN","Iowan Old Style",Georgia,"Times New Roman",serif';
const uiFont =
  '"Hiragino Sans","Yu Gothic",ui-sans-serif,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif';

/* ---- Pronunciation (Web Speech API — uses the device's Japanese voice) ---- */
function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices() || [];
    const v = voices.find((x) => x.lang && x.lang.toLowerCase().startsWith("ja"));
    if (v) u.voice = v;
    u.lang = v ? v.lang : "ja-JP";
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  } catch {
    /* ignore */
  }
}

function Speaker({ text, size = 18, color = "#c8453b" }) {
  return (
    <button
      className="tap"
      aria-label="Play pronunciation"
      onClick={(e) => { e.stopPropagation(); speak(text); }}
      style={{
        border: `1px solid ${color}66`, background: `${color}1f`, color,
        borderRadius: 999, width: size + 18, height: size + 18,
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        fontSize: size, cursor: "pointer", flexShrink: 0,
      }}
    >
      🔊
    </button>
  );
}

/* ===================== KANA: hiragana + katakana ===================== */
/* [glyph, romaji, hint] */
const HIRAGANA = [
  ["あ","a","like 'a' in 'father'"],["い","i","like 'ee' in 'see'"],["う","u","like 'oo' in 'food'"],["え","e","like 'e' in 'bed'"],["お","o","like 'o' in 'or'"],
  ["か","ka",""],["き","ki",""],["く","ku",""],["け","ke",""],["こ","ko",""],
  ["さ","sa",""],["し","shi","'shi', not 'si'"],["す","su",""],["せ","se",""],["そ","so",""],
  ["た","ta",""],["ち","chi","'chi', not 'ti'"],["つ","tsu","'tsu', not 'tu'"],["て","te",""],["と","to",""],
  ["な","na",""],["に","ni",""],["ぬ","nu",""],["ね","ne",""],["の","no",""],
  ["は","ha","as particle, read 'wa'"],["ひ","hi",""],["ふ","fu","soft 'fu'"],["へ","he","as particle, read 'e'"],["ほ","ho",""],
  ["ま","ma",""],["み","mi",""],["む","mu",""],["め","me",""],["も","mo",""],
  ["や","ya",""],["ゆ","yu",""],["よ","yo",""],
  ["ら","ra","light tapped r"],["り","ri",""],["る","ru",""],["れ","re",""],["ろ","ro",""],
  ["わ","wa",""],["を","wo","object particle, read 'o'"],["ん","n","the only solo consonant"],
];
const KATAKANA = [
  ["ア","a",""],["イ","i",""],["ウ","u",""],["エ","e",""],["オ","o",""],
  ["カ","ka",""],["キ","ki",""],["ク","ku",""],["ケ","ke",""],["コ","ko",""],
  ["サ","sa",""],["シ","shi","compare with ツ (tsu)"],["ス","su",""],["セ","se",""],["ソ","so","compare with ン (n)"],
  ["タ","ta",""],["チ","chi",""],["ツ","tsu","compare with シ (shi)"],["テ","te",""],["ト","to",""],
  ["ナ","na",""],["ニ","ni",""],["ヌ","nu",""],["ネ","ne",""],["ノ","no",""],
  ["ハ","ha",""],["ヒ","hi",""],["フ","fu",""],["ヘ","he",""],["ホ","ho",""],
  ["マ","ma",""],["ミ","mi",""],["ム","mu",""],["メ","me",""],["モ","mo",""],
  ["ヤ","ya",""],["ユ","yu",""],["ヨ","yo",""],
  ["ラ","ra",""],["リ","ri",""],["ル","ru",""],["レ","re",""],["ロ","ro",""],
  ["ワ","wa",""],["ヲ","wo",""],["ン","n","compare with ソ (so)"],
];

const LEGEND = [
  ["shi", "し / シ — never 'si'"],
  ["chi", "ち / チ — never 'ti'"],
  ["tsu", "つ / ツ — never 'tu'"],
  ["fu", "ふ / フ — a soft f, between f and h"],
  ["は → wa", "は is 'ha', but reads 'wa' as a topic particle"],
  ["を → o", "を is the object particle, read 'o'"],
  ["へ → e", "へ reads 'e' as a direction particle"],
  ["゛ ゜", "dakuten/handakuten turn か→が, は→ば, は→ぱ"],
];

/* ---- Stroke counts + short cues for handwriting (hiragana) ---- */
const STROKES = {
  "あ":[3,"Cross-stroke, a vertical, then the loop-and-curl below."],
  "い":[2,"Left stroke curving down, then a short stroke on the right."],

function romajiToKana(input) {
  let s = (input || "").toLowerCase();
  s = s.replace(/[āáàâ]/g,"aa").replace(/[īíìî]/g,"ii").replace(/[ūúùû]/g,"uu")
       .replace(/[ēéèê]/g,"ee").replace(/[ōóòô]/g,"ou");
  let out = "";
  let i = 0;
  const vowels = "aiueo";
  while (i < s.length) {
    const c = s[i];
    if (c === " ") { out += " "; i++; continue; }
    // sokuon: doubled consonant (not n) -> small tsu
    if (c !== "n" && !vowels.includes(c) && s[i+1] === c) {
      out += "っ"; i++; continue;
    }
    // syllabic n: a lone n before any consonant (or end) -> ん
    if (c === "n") {
      const nx = s[i+1];
      if (nx === "'") { out += "ん"; i += 2; continue; }
      if (nx === undefined || (!vowels.includes(nx) && nx !== "y")) {
        out += "ん"; i++; continue;
      }
    }
    // try 3, then 2, then 1 char match
    let matched = false;
    for (let len = 3; len >= 1; len--) {
      const chunk = s.slice(i, i + len);
      if (ROMA[chunk]) { out += ROMA[chunk]; i += len; matched = true; break; }
    }
    if (!matched) { out += c; i++; }
  }
  return out;
}

const kataToHira = (s) =>
  (s || "").replace(/[\u30a1-\u30f6]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));

/* normalise a kana string for comparison */
function kanaNorm(s) {
  return kataToHira(s || "")
    .replace(/[ー〜・、。\s]/g, "")
    .replace(/[^\u3040-\u309f]/g, "");
}
/* normalise a romaji string for comparison */
function normRomaji(s) {
  return (s || "").toLowerCase()
    .replace(/[āáàâ]/g,"aa").replace(/[īíìî]/g,"ii").replace(/[ūúùû]/g,"uu")
    .replace(/[ēéèê]/g,"ee").replace(/[ōóòô]/g,"ou")
    .replace(/[^a-z]/g, "");
}

function answerMatches(input, item) {
  const raw = (input || "").trim();
  if (!raw) return false;
  const r = normRomaji(raw);
  if (r) {
    if (r === normRomaji(item.romaji)) return true;
    if ((item.alts || []).some((x) => normRomaji(x) === r)) return true;
  }
  const hasKana = /[\u3040-\u30ff]/.test(raw);
  const typedKana = hasKana ? kanaNorm(raw) : kanaNorm(romajiToKana(r));
  if (typedKana && typedKana === kanaNorm(item.kana)) return true;
  return false;
}

/* ---- Time + dates ---- */
const HOUR = 3600000;
const DAY = 86400000;
const todayStr = () => new Date().toISOString().slice(0, 10);
const shiftDay = (s, n) => {
  const d = new Date(s + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
};

/* ---- SRS stages (WaniKani-style) ---- */
const STAGE_MS = { 1:2*HOUR, 2:4*HOUR, 3:8*HOUR, 4:23*HOUR, 5:3*DAY, 6:7*DAY, 7:14*DAY, 8:30*DAY, 9:Infinity };
function stageMeta(stage) {
  if (stage >= 9) return { group: "Burned", short: "Burned", color: "#241f1b" };
  if (stage >= 8) return { group: "Enlightened", short: "Enlightened", color: "#1c2c52" };
  if (stage >= 7) return { group: "Master", short: "Master", color: "#801d5c" };
  if (stage >= 5) return { group: "Guru", short: "Guru " + (stage - 4), color: "#c02e80" };
  if (stage >= 1) return { group: "Apprentice", short: "Apprentice " + stage, color: "#c8453b" };
  return { group: "Locked", short: "—", color: "#9a8b74" };
}
const STAGE_GROUPS = ["Apprentice", "Guru", "Master", "Enlightened", "Burned"];
function learnItem(now) {
  return { stage: 1, due: now + STAGE_MS[1], correct: 0, wrong: 0, recentWrong: 0, learnedAt: now };
}
function reviewSchedule(prog, correct, now) {
  let stage = prog ? prog.stage : 1;
  stage = correct ? Math.min(9, stage + 1) : Math.max(1, stage - (stage >= 5 ? 2 : 1));
  const ms = STAGE_MS[stage];
  return {
    stage,
    due: ms === Infinity ? Infinity : now + ms,
    lastReviewed: now,
    learnedAt: prog ? prog.learnedAt : now,
    correct: (prog ? prog.correct : 0) + (correct ? 1 : 0),
    wrong: (prog ? prog.wrong : 0) + (correct ? 0 : 1),
    recentWrong: correct ? 0 : (prog ? prog.recentWrong || 0 : 0) + 1,
  };
}
function isLeech(prog) { return !!prog && (prog.recentWrong || 0) >= 2; }
function fmtUntil(due, now) {
  if (due === Infinity) return "burned";
  const d = due - now;
  if (d <= 0) return "now";
  if (d < HOUR) return Math.max(1, Math.round(d / 60000)) + "m";
  if (d < DAY) return Math.round(d / HOUR) + "h";
  return Math.round(d / DAY) + "d";
}

/* ===================== TYPED QUIZ (romaji, with live kana preview) ===================== */
function TypedQuiz({ items, mode, onGrade, onExit, title }) {
  const [queue] = useState(() => items);
  const [i, setI] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState({ right: 0, total: 0 });
  const [leveled, setLeveled] = useState(null);
  const [done, setDone] = useState(items.length === 0);
  const inputRef = useRef(null);

  const item = queue[i];
  const preview = !/[\u3040-\u30ff]/.test(answer) ? romajiToKana(answer) : answer;

  useEffect(() => { if (!feedback && inputRef.current) inputRef.current.focus(); }, [i, feedback]);

  const submit = () => {
    if (feedback) {
      setFeedback(null); setAnswer("");
      if (i + 1 >= queue.length) setDone(true); else setI(i + 1);
      return;
    }
    const ok = answerMatches(answer, item);
    const lvl = onGrade(item.id, ok, mode);
    if (lvl) setLeveled(lvl);
    setFeedback(ok ? "correct" : "wrong");
    setScore((s) => ({ right: s.right + (ok ? 1 : 0), total: s.total + 1 }));
  };
  const giveUp = () => {
    if (feedback) return;
    const lvl = onGrade(item.id, false, mode);
    if (lvl) setLeveled(lvl);
    setFeedback("wrong");
    setScore((s) => ({ right: s.right, total: s.total + 1 }));
  };

  if (done) {
    const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>{items.length === 0 ? "🌸" : "🎉"}</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>{items.length === 0 ? "Nothing to quiz right now" : "All done!"}</div>
        {items.length > 0 && (<div style={{ color: T.textDim, fontSize: 14, marginTop: 8 }}>{score.right}/{score.total} correct · {acc}% accuracy</div>)}
        {leveled && (
          <div style={{ marginTop: 14, background: `${T.gold}14`, border: `1px solid ${T.gold}`, borderRadius: 14, padding: "12px 14px", color: T.gold, fontWeight: 700 }}>
            🎊 Level up! You reached Level {leveled} — new words unlocked.
          </div>
        )}
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 18, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back to home</button>
      </div>
    );
  }

  const correct = feedback === "correct";
  const wrong = feedback === "wrong";

  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.goldSoft, whiteSpace: "nowrap" }}>{title}</div>
        <div style={{ flex: 1, height: 4, background: T.line, borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(i / queue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})`, transition: "width .3s ease" }} />
        </div>
        <div style={{ fontSize: 12, color: T.textDim }}>{score.right}/{score.total}</div>
      </div>

      <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "22px 18px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>Type the reading · {item.type}</div>
        <div style={{ fontFamily: displayFont, fontSize: 24, color: T.text, marginTop: 8 }}>{item.en}</div>
      </div>

      <input
        ref={inputRef}
        value={answer}
        onChange={(e) => !feedback && setAnswer(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
        placeholder="type romaji…  e.g. arigatou"
        autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck={false}
        readOnly={!!feedback}
        style={{ width: "100%", marginTop: 12, padding: "13px 16px", borderRadius: 14, border: `2px solid ${correct ? T.green : wrong ? T.red : T.line}`, background: correct ? `${T.green}10` : wrong ? `${T.red}10` : T.panel, color: T.text, fontFamily: uiFont, fontSize: 19, outline: "none", textAlign: "center" }}
      />
      {!feedback && (
        <div style={{ textAlign: "center", minHeight: 30, marginTop: 6, fontFamily: jaFont, fontSize: 24, color: answer ? T.gold : T.textDim, letterSpacing: 1 }}>
          {answer ? preview : "ひらがな"}
        </div>
      )}

      {feedback && (
        <div className="fade" style={{ marginTop: 12, background: T.panel, border: `1px solid ${wrong ? T.red : T.green}`, borderRadius: 14, padding: "12px 14px", textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: wrong ? T.red : T.green }}>{correct ? "Correct!" : "Answer:"}</div>
          <div style={{ fontFamily: jaFont, fontSize: 30, color: T.text, marginTop: 4 }}>{item.ja}</div>
          {item.kana !== item.ja && (<div style={{ fontFamily: jaFont, fontSize: 17, color: T.textDim }}>{item.kana}</div>)}
          <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 14 }}>{item.romaji}</div>
          <div style={{ marginTop: 8 }}><Speaker text={item.ja} color={T.terra} /></div>
        </div>
      )}

      <button className="tap" onClick={submit} style={{ width: "100%", marginTop: 12, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
        {feedback ? (i + 1 >= queue.length ? "Finish" : "Next →") : "Check answer"}
      </button>
      {!feedback && (
        <button className="tap" onClick={giveUp} style={{ width: "100%", marginTop: 8, padding: 11, borderRadius: 12, border: `1px solid ${T.line}`, background: "transparent", color: T.textDim, fontSize: 13, fontWeight: 600 }}>
          I don't know — show me
        </button>
      )}
      <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 8, padding: 9, borderRadius: 12, border: "none", background: "transparent", color: T.textDim, fontSize: 12 }}>
        End session
      </button>
      <div style={{ textAlign: "center", fontSize: 11, color: T.textDim, marginTop: 10, lineHeight: 1.6 }}>
        Type the reading in romaji — it converts to kana as you go. Long vowels like “ou / uu” count, and kana input works too.
      </div>
    </div>
  );
}

/* ===================== LEARN SESSION (teach N, then quiz them) ===================== */
function LearnSession({ pool, batch, onLearn, onGrade, onExit }) {
  const [queue] = useState(() => pool.slice(0, batch));
  const [phase, setPhase] = useState(queue.length ? "teach" : "empty");
  const [i, setI] = useState(0);

  if (phase === "empty") {
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "44px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>🌱</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>No new words right now</div>
        <div style={{ color: T.textDim, fontSize: 13.5, marginTop: 8, lineHeight: 1.6 }}>
          You've learned everything unlocked so far. Master your current level in Reviews (reach Guru on 90%) to unlock the next set.
        </div>
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 18, padding: 13, borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Home</button>
      </div>
    );
  }
  if (phase === "quiz") {
    return (
      <div>
        <div style={{ textAlign: "center", fontSize: 12.5, color: T.textDim, margin: "0 0 12px", lineHeight: 1.5 }}>
          Now type each reading to lock it in 👇
        </div>
        <TypedQuiz items={queue} mode="srs" onGrade={onGrade} onExit={onExit} title="Lesson quiz" />
      </div>
    );
  }

  const item = queue[i];
  return (
    <div className="fade">
      <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ height: "100%", width: `${(i / queue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
      </div>
      <div className="pop" key={item.id} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New {item.type} · Level {item.level}</div>
        <div style={{ fontFamily: jaFont, fontSize: item.type === "sentence" ? 30 : 46, color: T.text, margin: "14px 0 4px", lineHeight: 1.35 }}>{item.ja}</div>
        {item.kana !== item.ja && (<div style={{ fontFamily: jaFont, fontSize: 18, color: T.textDim }}>{item.kana}</div>)}
        <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 16, marginTop: 4 }}>{item.romaji}</div>
        <div style={{ fontFamily: displayFont, fontSize: 20, marginTop: 6 }}>{item.en}</div>
        <div style={{ marginTop: 14 }}><Speaker text={item.ja} size={20} color={T.gold} /></div>
      </div>
      <button className="tap" onClick={() => { onLearn(item.id); if (i + 1 >= queue.length) setPhase("quiz"); else setI(i + 1); }}
        style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
        {i + 1 >= queue.length ? "Got them — start quiz →" : "Learn it ✓"}
      </button>
      <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {i + 1} of {queue.length}</div>
    </div>
  );
}

/* ===================== ITEMS BROWSER ===================== */
function ItemsView({ allItems, state, level, leeches, onAdd, onStartPractice }) {
  const [filter, setFilter] = useState("all");
  const [selected, setSelected] = useState({});
  const now = Date.now();

  const shown = allItems.filter((it) => {
    const p = state.progress[it.id];
    if (filter === "learned") return !!p;
    if (filter === "due") return p && p.due !== Infinity && p.due <= now;
    if (filter === "leech") return isLeech(p);
    if (filter === "locked") return !p && !it.custom && it.level > level;
    return it.custom || it.level <= level || !!p;
  });

  const badge = (it) => {
    const p = state.progress[it.id];
    if (!p) return { t: it.level > level ? "Locked" : "New", c: it.level > level ? T.textDim : T.terra };
    const m = stageMeta(p.stage);
    return { t: m.short, c: m.color };
  };

  const toggle = (id) => setSelected((s) => ({ ...s, [id]: !s[id] }));
  const startSelected = () => {
    const items = allItems.filter((it) => selected[it.id] && state.progress[it.id]);
    if (items.length) onStartPractice(items);
  };
  const selCount = Object.values(selected).filter(Boolean).length;

  const filters = [["all","All"],["learned","Learned"],["due","Due"],["leech","Tricky"],["locked","Locked"]];

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
        {filters.map(([k, label]) => (
          <button key={k} className="tap" onClick={() => setFilter(k)} style={{ whiteSpace: "nowrap", padding: "7px 13px", borderRadius: 999, border: `1px solid ${filter === k ? T.gold : T.line}`, background: filter === k ? `${T.gold}14` : T.panel, color: filter === k ? T.gold : T.textDim, fontWeight: 600, fontSize: 13 }}>{label}</button>
        ))}
      </div>

      {selCount > 0 && (
        <button className="tap" onClick={startSelected} style={{ width: "100%", margin: "10px 0", padding: 12, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>
          Practice {selCount} selected →
        </button>
      )}

      <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
        {shown.map((it) => {
          const b = badge(it);
          const p = state.progress[it.id];
          const sel = !!selected[it.id];
          return (
            <div key={it.id} onClick={() => p && toggle(it.id)} style={{ display: "flex", alignItems: "center", gap: 12, background: sel ? `${T.gold}0e` : T.panel, border: `1px solid ${sel ? T.gold : T.line}`, borderRadius: 14, padding: "11px 13px", cursor: p ? "pointer" : "default" }}>
              <div style={{ fontFamily: jaFont, fontSize: 26, color: T.text, minWidth: 64 }}>{it.ja}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, color: T.text, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.en}</div>
                <div style={{ fontSize: 12, color: T.goldSoft, fontStyle: "italic" }}>{it.romaji}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: b.c }}>{b.t}</div>
                {p && p.due !== Infinity && (<div style={{ fontSize: 10, color: T.textDim }}>{fmtUntil(p.due, now)}</div>)}
              </div>
              <Speaker text={it.ja} size={14} color={T.terra} />
            </div>
          );
        })}
        {shown.length === 0 && (<div style={{ textAlign: "center", color: T.textDim, padding: "30px 0", fontSize: 14 }}>Nothing here yet.</div>)}
      </div>
    </div>
  );
}

/* ===================== STATS ===================== */
function MiniBars({ series, color, unit }) {
  const max = Math.max(1, ...series.map((s) => s.v));
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 70 }}>
      {series.map((s, idx) => (
        <div key={idx} style={{ flex: 1, textAlign: "center" }}>
          <div style={{ height: 54, display: "flex", alignItems: "flex-end" }}>
            <div title={`${s.v} ${unit}`} style={{ width: "100%", height: `${(s.v / max) * 100}%`, minHeight: s.v ? 3 : 0, background: color, borderRadius: 4, transition: "height .3s ease" }} />
          </div>
          <div style={{ fontSize: 9, color: T.textDim, marginTop: 3 }}>{s.label}</div>
        </div>
      ))}
    </div>
  );
}
function StatsView({ state, allItems, level, streak }) {
  const now = Date.now();
  const learned = allItems.filter((it) => state.progress[it.id]).length;
  const burned = allItems.filter((it) => (state.progress[it.id]?.stage || 0) >= 9).length;
  const days = [];
  for (let k = 6; k >= 0; k--) {
    const d = shiftDay(todayStr(), -k);
    days.push({ label: ["S","M","T","W","T","F","S"][new Date(d + "T00:00:00Z").getUTCDay()], v: state.history[d] || 0 });
  }
  const stageDist = {};
  allItems.forEach((it) => { const p = state.progress[it.id]; if (!p) return; const g = stageMeta(p.stage).group; stageDist[g] = (stageDist[g] || 0) + 1; });

  const Stat = ({ v, l, c }) => (
    <div style={{ flex: 1, textAlign: "center", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: "13px 4px" }}>
      <div style={{ fontSize: 24, fontWeight: 800, color: c }}>{v}</div>
      <div style={{ fontSize: 10.5, color: T.textDim, marginTop: 2 }}>{l}</div>
    </div>
  );

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8 }}>
        <Stat v={level} l="Level" c={T.gold} />
        <Stat v={learned} l="Learned" c={T.terra} />
        <Stat v={burned} l="Burned" c={T.text} />
        <Stat v={streak + "🔥"} l="Streak" c={T.gold} />
      </div>

      <div style={{ marginTop: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "14px 16px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Reviews — last 7 days</div>
        <MiniBars series={days} color={T.gold} unit="reviews" />
      </div>

      <div style={{ marginTop: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "14px 16px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>SRS distribution</div>
        {STAGE_GROUPS.map((g) => {
          const v = stageDist[g] || 0;
          const pct = learned ? v / learned : 0;
          const c = stageMeta(g === "Apprentice" ? 1 : g === "Guru" ? 5 : g === "Master" ? 7 : g === "Enlightened" ? 8 : 9).color;
          return (
            <div key={g} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: T.textDim, marginBottom: 3 }}><span>{g}</span><span>{v}</span></div>
              <div style={{ height: 7, background: T.line, borderRadius: 7, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${pct * 100}%`, background: c, transition: "width .4s ease" }} />
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "14px 16px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Level progress</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {Array.from({ length: MAX_LEVEL }, (_, k) => k + 1).map((l) => {
            const items = ITEMS.filter((it) => it.level === l);
            const guru = items.filter((it) => (state.progress[it.id]?.stage || 0) >= 5).length;
            const done = items.length && guru === items.length;
            const cur = l === level;
            return (
              <div key={l} style={{ width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11.5, fontWeight: 700, background: done ? T.gold : cur ? `${T.terra}22` : T.panelHi, color: done ? "#fff" : cur ? T.terra : (l > level ? T.textDim : T.text), border: `1px solid ${cur ? T.terra : T.line}` }}>{l}</div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ===================== SCRIPT TRAINER (kana) ===================== */

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function Stat({ label, value, color }) {
  return (
    <div style={{ flex: 1, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 13, padding: "10px 6px", textAlign: "center" }}>
      <div style={{ fontSize: 17, fontWeight: 800, color: color || T.text }}>{value}</div>
      <div style={{ fontSize: 10.5, color: T.textDim, marginTop: 2, textTransform: "uppercase", letterSpacing: 0.4 }}>{label}</div>
    </div>
  );
}

const KANA_SETS = { hira: HIRAGANA, kata: KATAKANA };
function strokeInfo(glyph, chart) { return chart === "kata" ? STROKES_KATA[glyph] : STROKES[glyph]; }

/* a kana multiple-choice question: compare on romaji (index 1) */
function makeKanaQ(answer, set) {
  const pool = shuffle(set.filter((x) => x[1] !== answer[1])).slice(0, 3);
  const options = shuffle([answer, ...pool]);
  return { answer, options };
}

/* type-mode match: accept romaji OR kana typed for a target glyph */
function kanaTypeMatch(typed, glyph) {
  const t = (typed || "").trim();
  if (!t) return false;
  const g = kataToHira(glyph);
  if (kataToHira(t) === g) return true;
  if (romajiToKana(normRomaji(t)) === g) return true;
  return false;
}

/* ---- wrapper with mode tabs + hiragana/katakana toggle ---- */
function ScriptView({ scriptState, setScript }) {
  const ss = scriptState || {};
  const chart = ss.chart || "hira";
  const set = KANA_SETS[chart];
  const setChart = (c) => setScript({ ...ss, chart: c });
  const [mode, setMode] = useState("train");

  return (
    <div className="fade" style={{ paddingTop: 6 }}>
      {/* mode tabs */}
      <div style={{ display: "flex", gap: 6, background: T.panelHi, border: `1px solid ${T.line}`, padding: 5, borderRadius: 13, marginBottom: 12 }}>
        {[["train", "🎓 Train"], ["chart", "📖 Chart"], ["quiz", "✨ Quiz"], ["trace", "✍️ Trace"]].map(([k, label]) => (
          <button key={k} className="tap" onClick={() => setMode(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 2px", fontSize: 12, fontWeight: 600, color: mode === k ? "#fff" : T.textDim, background: mode === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
            {label}
          </button>
        ))}
      </div>

      {/* hiragana / katakana toggle */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {[["hira", "ひらがな Hiragana"], ["kata", "カタカナ Katakana"]].map(([k, label]) => (
          <button key={k} className="tap" onClick={() => setChart(k)} style={{ flex: 1, border: `1px solid ${chart === k ? T.gold : T.line}`, borderRadius: 11, padding: "9px 4px", fontSize: 12.5, fontWeight: 700, color: chart === k ? T.gold : T.textDim, background: chart === k ? `${T.gold}14` : T.panel }}>
            {label}
          </button>
        ))}
      </div>

      {mode === "train" && <ScriptTrain scriptState={ss} setScript={setScript} chart={chart} set={set} />}
      {mode === "chart" && <ScriptChart set={set} chart={chart} />}
      {mode === "quiz" && <ScriptQuiz set={set} chart={chart} />}
      {mode === "trace" && <ScriptTrace set={set} chart={chart} />}
    </div>
  );
}

/* ===================== TRAIN: learn a batch, then quiz (SRS-lite) ===================== */
function ScriptTrain({ scriptState, setScript, chart, set }) {
  const ss = scriptState || { progress: {}, best: 0, batch: 5 };
  const prog = ss.progress || {};
  const batch = ss.batch || 5;
  const quizDir = ss.quizDir || "recognize"; // recognize | type

  const [mode, setMode] = useState("menu"); // menu | teach | quiz | done
  const [teachQueue, setTeachQueue] = useState([]);
  const [tIdx, setTIdx] = useState(0);
  const [quizSet, setQuizSet] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const [typed, setTyped] = useState("");
  const [feedback, setFeedback] = useState(null); // null | "correct" | "wrong"
  const [sess, setSess] = useState({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);

  const learned = set.filter((a) => prog[a[0]] && prog[a[0]].learned);
  const unlearned = set.filter((a) => !(prog[a[0]] && prog[a[0]].learned));
  const trouble = set.filter((a) => (prog[a[0]]?.recentWrong || 0) >= 2);
  const mastered = set.filter((a) => { const p = prog[a[0]]; return p && p.correct >= 4 && (p.recentWrong || 0) === 0; });

  const saveLetter = (key, correct, newStreak) => {
    const p = prog[key] || { learned: true, correct: 0, wrong: 0, recentWrong: 0 };
    const np = { learned: true, correct: p.correct + (correct ? 1 : 0), wrong: p.wrong + (correct ? 0 : 1), recentWrong: correct ? 0 : (p.recentWrong || 0) + 1 };
    setScript({ ...ss, progress: { ...prog, [key]: np }, best: Math.max(ss.best || 0, newStreak || 0) });
  };
  const markLearned = (key) => {
    if (prog[key] && prog[key].learned) return;
    const p = prog[key] || { correct: 0, wrong: 0, recentWrong: 0 };
    setScript({ ...ss, progress: { ...prog, [key]: { ...p, learned: true } } });
  };
  const setBatch = (n) => setScript({ ...ss, batch: n });
  const setDir = (d) => setScript({ ...ss, quizDir: d });

  const applyResult = (glyph, correct) => {
    const newStreak = correct ? sess.streak + 1 : 0;
    setSess((s) => ({ right: s.right + (correct ? 1 : 0), total: s.total + 1, streak: newStreak, best: Math.max(s.best, newStreak) }));
    saveLetter(glyph, correct, newStreak);
  };

  const startLearn = () => {
    const next = unlearned.slice(0, batch);
    if (!next.length) return;
    setTeachQueue(next); setTIdx(0); setMode("teach");
  };
  const startQuiz = (list) => {
    if (!list.length) return;
    const s = shuffle(list).slice(0, 12);
    setQuizSet(s); setQIdx(0); setPicked(null); setTyped(""); setFeedback(null);
    setQ(makeKanaQ(s[0], set));
    setSess({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
    setMode("quiz");
  };
  const advance = () => {
    const n = qIdx + 1;
    if (n >= quizSet.length) { setMode("done"); return; }
    setQIdx(n); setPicked(null); setTyped(""); setFeedback(null);
    setQ(makeKanaQ(quizSet[n], set));
  };

  const choose = (opt) => {
    if (picked) return;
    const ans = q.answer;
    const correct = opt[1] === ans[1];
    speak(ans[0]); setPicked(opt); applyResult(ans[0], correct);
    timer.current = setTimeout(advance, 950);
  };
  const checkType = () => {
    const ans = q.answer;
    if (feedback) { advance(); return; }
    const correct = kanaTypeMatch(typed, ans[0]);
    speak(ans[0]); setFeedback(correct ? "correct" : "wrong"); applyResult(ans[0], correct);
  };
  const giveUpType = () => {
    if (feedback) return;
    const ans = q.answer;
    speak(ans[0]); setFeedback("wrong"); applyResult(ans[0], false);
  };
  const flipDir = () => {
    clearTimeout(timer.current);
    setDir(quizDir === "recognize" ? "type" : "recognize");
    setPicked(null); setTyped(""); setFeedback(null);
  };

  const chartName = chart === "kata" ? "katakana" : "hiragana";

  /* ---------- MENU ---------- */
  if (mode === "menu") {
    return (
      <div className="fade" style={{ paddingTop: 4 }}>
        <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "18px 18px 16px", marginBottom: 14, boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
          <div style={{ fontFamily: displayFont, fontSize: 21, color: T.gold }}>Master the {chartName}</div>
          <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 3, lineHeight: 1.5 }}>
            Learn {batch} kana, then quiz them — same idea as the word lessons. Lock in the script and reading everything else gets far easier.
          </div>
          <div style={{ margin: "14px 0 6px" }}><Bar pct={learned.length / set.length} /></div>
          <div style={{ fontSize: 12, color: T.textDim }}>{learned.length} / {set.length} kana learned · {mastered.length} mastered</div>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Best streak" value={`${ss.best || 0}🔥`} color={T.terra} />
          <Stat label="Learned" value={learned.length} color={T.gold} />
          <Stat label="Trouble" value={trouble.length} color={trouble.length ? T.red : T.textDim} />
        </div>

        <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, color: T.textDim, marginBottom: 8 }}>Quiz style</div>
          <div style={{ display: "flex", gap: 6 }}>
            {[["recognize", "👀 See kana → pick sound"], ["type", "⌨️ Hear sound → type kana"]].map(([k, label]) => (
              <button key={k} className="tap" onClick={() => setDir(k)} style={{ flex: 1, border: "none", borderRadius: 10, padding: "10px 6px", fontSize: 11.5, fontWeight: 600, lineHeight: 1.3, color: quizDir === k ? "#fff" : T.textDim, background: quizDir === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panelHi }}>
                {label}
              </button>
            ))}
          </div>
        </div>

        <button className="tap" onClick={startLearn} disabled={!unlearned.length} style={{ width: "100%", padding: 15, borderRadius: 14, marginBottom: 10, background: unlearned.length ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel, color: unlearned.length ? "#fff" : T.textDim, fontSize: 15, fontWeight: 700, boxShadow: unlearned.length ? "0 8px 20px rgba(128,29,92,.18)" : "none", border: unlearned.length ? "none" : `1px solid ${T.line}` }}>
          {unlearned.length ? `Learn next ${Math.min(batch, unlearned.length)} kana →` : `All ${set.length} ${chartName} learned 🎉`}
        </button>

        <button className="tap" onClick={() => startQuiz(learned)} disabled={!learned.length} style={{ width: "100%", padding: 13, borderRadius: 13, marginBottom: 10, border: `1px solid ${learned.length ? T.gold : T.line}`, background: learned.length ? `${T.gold}10` : T.panel, color: learned.length ? T.gold : T.textDim, fontSize: 14, fontWeight: 700 }}>
          ✨ Quiz learned kana
        </button>

        <button className="tap" onClick={() => startQuiz(trouble)} disabled={!trouble.length} style={{ width: "100%", padding: 13, borderRadius: 13, border: `1px solid ${trouble.length ? T.red : T.line}`, background: trouble.length ? `${T.red}0f` : T.panel, color: trouble.length ? T.red : T.textDim, fontSize: 14, fontWeight: 700 }}>
          🔁 Drill trouble kana {trouble.length ? `(${trouble.length})` : ""}
        </button>

        <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16, marginTop: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14 }}>Kana per quiz</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[3, 5, 7, 10].map((n) => (
                <button key={n} className="tap" onClick={() => setBatch(n)} style={{ border: `1px solid ${batch === n ? T.gold : T.line}`, background: batch === n ? `${T.gold}18` : "transparent", color: batch === n ? T.gold : T.textDim, borderRadius: 9, padding: "6px 11px", fontSize: 13, fontWeight: 600 }}>{n}</button>
              ))}
            </div>
          </div>
        </div>

        {trouble.length > 0 && (
          <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center" }}>
            {trouble.map((a) => (
              <span key={a[0]} style={{ fontFamily: jaFont, fontSize: 26, color: T.red, border: `1px solid ${T.red}44`, borderRadius: 9, padding: "2px 10px" }}>{a[0]}</span>
            ))}
          </div>
        )}
      </div>
    );
  }

  /* ---------- TEACH ---------- */
  if (mode === "teach") {
    const a = teachQueue[tIdx];
    const sk = strokeInfo(a[0], chart);
    return (
      <div className="fade">
        <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ height: "100%", width: `${(tIdx / teachQueue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
        </div>
        <div className="pop" key={a[0]} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "26px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
          <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New kana</div>
          <div style={{ fontFamily: jaFont, fontSize: 96, color: T.text, lineHeight: 1.1, margin: "6px 0 4px" }}>{a[0]}</div>
          <div style={{ fontSize: 22, color: T.gold, fontWeight: 700 }}>{a[1]}</div>
          {a[2] && <div style={{ fontSize: 13, color: T.textDim, marginTop: 4, lineHeight: 1.5 }}>{a[2]}</div>}
          {sk && (
            <div style={{ fontSize: 12.5, color: T.gold, marginTop: 8, lineHeight: 1.5 }}>
              ✍️ {sk[0]} stroke{sk[0] > 1 ? "s" : ""}{sk[1] ? ` · ${sk[1]}` : ""}
            </div>
          )}
          <div style={{ marginTop: 14 }}><Speaker text={a[0]} size={20} color={T.gold} /></div>
        </div>
        <button className="tap" onClick={() => { markLearned(a[0]); if (tIdx + 1 >= teachQueue.length) startQuiz(teachQueue); else setTIdx(tIdx + 1); }}
          style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
          {tIdx + 1 >= teachQueue.length ? "Got them — quiz me →" : "Learn it ✓"}
        </button>
        <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {tIdx + 1} of {teachQueue.length}</div>
      </div>
    );
  }

  /* ---------- DONE ---------- */
  if (mode === "done") {
    const acc = sess.total ? Math.round((sess.right / sess.total) * 100) : 0;
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>🎉</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>Nice work!</div>
        <div style={{ color: T.textDim, fontSize: 14, marginTop: 8 }}>{sess.right}/{sess.total} correct · {acc}% · best streak {sess.best}🔥</div>
        <button className="tap" onClick={() => setMode("menu")} style={{ width: "100%", marginTop: 18, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back</button>
      </div>
    );
  }

  /* ---------- QUIZ ---------- */
  const ans = q.answer;
  const isType = quizDir === "type";
  const correct = feedback === "correct";
  const wrong = feedback === "wrong";
  const preview = !/[\u3040-\u30ff]/.test(typed) ? romajiToKana(typed) : typed;

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <Stat label="Score" value={`${sess.right}/${sess.total}`} color={T.gold} />
        <Stat label="Streak" value={`${sess.streak}🔥`} color={T.terra} />
        <Stat label="Best" value={sess.best} color={T.green} />
      </div>

      <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
        <button className="tap" onClick={flipDir} style={{ border: `1px solid ${T.line}`, background: T.panelHi, color: T.gold, borderRadius: 20, padding: "7px 14px", fontSize: 12, fontWeight: 600 }}>
          {isType ? "Hear sound → type kana" : "See kana → pick sound"} ⇄
        </button>
      </div>

      {!isType ? (
        <>
          <div className="pop" key={ans[0] + qIdx} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "26px 20px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.10)", marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>Which sound is this?</div>
            <div style={{ fontFamily: jaFont, fontSize: 88, color: T.text, lineHeight: 1 }}>{ans[0]}</div>
            <div style={{ marginTop: 12 }}><Speaker text={ans[0]} size={18} color={T.terra} /></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {q.options.map((opt, i) => {
              let bg = T.panel, border = T.line, col = T.text;
              if (picked) {
                const isCorrect = opt[1] === ans[1];
                const isPicked = opt[1] === picked[1];
                if (isCorrect) { bg = `${T.green}1a`; border = T.green; col = T.gold; }
                else if (isPicked) { bg = `${T.red}1a`; border = T.red; col = T.red; }
              }
              return (
                <button key={i} className="tap" onClick={() => choose(opt)} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: "14px 8px", cursor: "pointer", minHeight: 58, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontFamily: displayFont, fontSize: 22, color: col, fontWeight: 600 }}>{opt[1]}</span>
                </button>
              );
            })}
          </div>
          {picked && (
            <div className="fade" style={{ textAlign: "center", marginTop: 14, fontSize: 14 }}>
              <span style={{ fontFamily: jaFont, fontSize: 26, color: T.text }}>{ans[0]}</span>
              <span style={{ color: T.textDim }}> = </span>
              <span style={{ color: T.gold, fontWeight: 700 }}>{ans[1]}</span>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="pop" key={ans[0] + qIdx} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "22px 20px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.10)" }}>
            <div style={{ fontSize: 12, color: T.textDim, marginBottom: 8 }}>Type the kana for this sound</div>
            <div style={{ fontFamily: displayFont, fontSize: 40, color: T.gold, fontWeight: 700 }}>{ans[1]}</div>
            <div style={{ marginTop: 10 }}><Speaker text={ans[0]} size={18} color={T.terra} /></div>
          </div>

          <div style={{ position: "relative", marginTop: 12 }}>
            <input value={typed} onChange={(e) => !feedback && setTyped(e.target.value)} onKeyDown={(e) => e.key === "Enter" && checkType()}
              placeholder="type romaji…  e.g. shi" readOnly={!!feedback} autoCapitalize="off" autoCorrect="off" spellCheck={false}
              style={{ width: "100%", padding: "12px 16px", borderRadius: 14, border: `2px solid ${correct ? T.green : wrong ? T.red : T.line}`, background: correct ? `${T.green}10` : wrong ? `${T.red}10` : T.panel, color: T.text, fontSize: 18, outline: "none", textAlign: "center" }} />
            {typed && !feedback && (
              <div style={{ textAlign: "center", marginTop: 8, fontFamily: jaFont, fontSize: 30, color: T.gold }}>{preview}</div>
            )}
          </div>

          {feedback && (
            <div className="fade" style={{ marginTop: 12, background: T.panel, border: `1px solid ${wrong ? T.red : T.green}`, borderRadius: 14, padding: "12px 14px", textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: wrong ? T.red : T.green }}>{correct ? "Correct!" : "Answer:"}</div>
              <div style={{ fontFamily: jaFont, fontSize: 44, color: T.text, marginTop: 2 }}>{ans[0]}</div>
              <div style={{ color: T.gold, fontSize: 15, fontWeight: 700 }}>{ans[1]}</div>
            </div>
          )}

          <button className="tap" onClick={checkType} style={{ width: "100%", marginTop: 12, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
            {feedback ? (qIdx + 1 >= quizSet.length ? "Finish" : "Next →") : "Check answer"}
          </button>
          {!feedback && (
            <button className="tap" onClick={giveUpType} style={{ width: "100%", marginTop: 8, padding: 11, borderRadius: 12, border: `1px solid ${T.line}`, background: "transparent", color: T.textDim, fontSize: 13, fontWeight: 600 }}>
              I don't know — show me
            </button>
          )}
        </>
      )}

      <button className="tap" onClick={() => { clearTimeout(timer.current); setMode("menu"); }} style={{ width: "100%", marginTop: 16, padding: 10, borderRadius: 12, border: "none", background: "transparent", color: T.textDim, fontSize: 12 }}>
        End session
      </button>
      <div style={{ fontSize: 11, color: T.textDim, textAlign: "center", marginTop: 6, lineHeight: 1.6 }}>
        {qIdx + 1} of {quizSet.length} · {isType ? "tap 🔊 to hear the sound, then type romaji — it becomes kana." : "you'll hear each kana as you answer."}
      </div>
    </div>
  );
}

/* ===================== CHART: full kana reference ===================== */
function ScriptChart({ set, chart }) {
  const rows = [];
  let i = 0;
  // group into rows of 5, with the small y-/w-/n- groups handled naturally
  const groups = [];
  let cur = [];
  set.forEach((k) => { cur.push(k); if (cur.length === 5) { groups.push(cur); cur = []; } });
  if (cur.length) groups.push(cur);

  return (
    <div className="fade" style={{ paddingTop: 4 }}>
      <div style={{ fontFamily: displayFont, fontSize: 20, marginBottom: 6 }}>The {chart === "kata" ? "katakana" : "hiragana"} chart</div>
      <p style={{ fontSize: 13.5, color: T.textDim, lineHeight: 1.7, marginTop: 0 }}>
        Japanese is written left-to-right. Each kana is one syllable. {chart === "kata" ? "Katakana is used for foreign words, names, and emphasis." : "Hiragana is the everyday script for native words and grammar."} Tap any kana to hear it.
      </p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 7, marginTop: 14 }}>
        {set.map((k) => {
          const sk = strokeInfo(k[0], chart);
          return (
            <button key={k[0]} className="tap" onClick={() => speak(k[0])} style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 12, padding: "10px 4px 8px", textAlign: "center", cursor: "pointer", position: "relative" }}>
              {sk && <span style={{ position: "absolute", top: 4, right: 6, fontSize: 9, color: T.textDim }}>{sk[0]}</span>}
              <div style={{ fontFamily: jaFont, fontSize: 30, color: T.text, lineHeight: 1.1 }}>{k[0]}</div>
              <div style={{ fontSize: 11, color: T.gold, fontWeight: 700, marginTop: 2 }}>{k[1]}</div>
            </button>
          );
        })}
      </div>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "22px 0 10px", color: T.gold }}>Watch out for these</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {LEGEND.map(([k, v]) => (

            <div style={{ fontFamily: jaFont, fontSize: 15, color: T.terra, fontWeight: 700, minWidth: 64 }}>{k}</div>
            <div style={{ fontSize: 12.5, color: T.textDim, lineHeight: 1.5 }}>{v}</div>

        The small number in each cell is the stroke count. Try the <b style={{ color: T.text }}>Trace</b> tab to practice writing.
      </div>
    </div>
  );
}

/* ===================== QUIZ: standalone recognition drill ===================== */
function ScriptQuiz({ set, chart }) {
  const [dirMode, setDirMode] = useState("k2s"); // k2s: kana→sound · s2k: sound→kana
  const [q, setQ] = useState(() => makeKanaQ(set[Math.floor(Math.random() * set.length)], set));
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);
  // reset question when the chart changes
  useEffect(() => { setQ(makeKanaQ(set[Math.floor(Math.random() * set.length)], set)); setPicked(null); }, [chart]); // eslint-disable-line

  const showKana = dirMode === "k2s";
  const next = () => { setPicked(null); setQ(makeKanaQ(set[Math.floor(Math.random() * set.length)], set)); };
  const choose = (opt) => {
    if (picked) return;
    const ok = opt[1] === q.answer[1];
    speak(q.answer[0]); setPicked(opt);
    setScore((s) => { const streak = ok ? s.streak + 1 : 0; return { right: s.right + (ok ? 1 : 0), total: s.total + 1, streak, best: Math.max(s.best, streak) }; });
    timer.current = setTimeout(next, 950);
  };
  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
        <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
        <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
        <Stat label="Best" value={score.best} color={T.green} />
      </div>

      <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
        <button className="tap" onClick={() => { setDirMode((d) => (d === "k2s" ? "s2k" : "k2s")); setPicked(null); }} style={{ border: `1px solid ${T.line}`, background: T.panelHi, color: T.gold, borderRadius: 20, padding: "7px 14px", fontSize: 12.5, fontWeight: 600 }}>
          {showKana ? "See kana → pick sound" : "See sound → pick kana"} ⇄
        </button>
      </div>

      <div className="pop" key={q.answer[1] + dirMode} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 20px", textAlign: "center", boxShadow: "0 14px 36px rgba(128,29,92,.10)", marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>{showKana ? "Which sound is this?" : "Which kana makes this sound?"}</div>
        {showKana ? (
          <div style={{ fontFamily: jaFont, fontSize: 84, color: T.text, lineHeight: 1 }}>{q.answer[0]}</div>
        ) : (
          <div style={{ fontFamily: displayFont, fontSize: 44, color: T.gold, fontWeight: 700 }}>{q.answer[1]}</div>
        )}
        <div style={{ marginTop: 14 }}><Speaker text={q.answer[0]} size={18} color={T.terra} /></div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {q.options.map((opt, i) => {
          let bg = T.panel, border = T.line, col = T.text;
          if (picked) {
            const isCorrect = opt[1] === q.answer[1];
            const isPicked = opt[1] === picked[1];
            if (isCorrect) { bg = `${T.green}1a`; border = T.green; col = T.gold; }
            else if (isPicked) { bg = `${T.red}1a`; border = T.red; col = T.red; }
          }
          return (
            <button key={i} className="tap" onClick={() => choose(opt)} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: showKana ? "12px 8px" : "16px 8px", cursor: "pointer", minHeight: 64, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {showKana ? (
                <span style={{ fontFamily: displayFont, fontSize: 22, color: col, fontWeight: 600 }}>{opt[1]}</span>
              ) : (
                <span style={{ fontFamily: jaFont, fontSize: 40, color: col }}>{opt[0]}</span>
              )}
            </button>
          );
        })}
      </div>

      {picked && (
        <div className="fade" style={{ textAlign: "center", marginTop: 16, fontSize: 14 }}>
          <span style={{ fontFamily: jaFont, fontSize: 26, color: T.text }}>{q.answer[0]}</span>
          <span style={{ color: T.textDim }}> = </span>
          <span style={{ color: T.gold, fontWeight: 700 }}>{q.answer[1]}</span>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 18, lineHeight: 1.6 }}>
        Tap an answer — you'll hear the kana and the next question loads automatically.
      </div>
    </div>
  );
}

/* ===================== TRACE: handwriting practice ===================== */
function ScriptTrace({ set, chart }) {
  const [tmode, setTmode] = useState("practice"); // practice | quiz
  const [idx, setIdx] = useState(0);
  const [showGuide, setShowGuide] = useState(true);
  const [qIdx, setQIdx] = useState(() => Math.floor(Math.random() * set.length));
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);
  const [, setStrokes] = useState(0);

  const isQuiz = tmode === "quiz";
  const activeIdx = (isQuiz ? qIdx : idx) % set.length;
  const kana = set[activeIdx];
  const sk = strokeInfo(kana[0], chart);
  const guideOn = isQuiz ? revealed : showGuide;
  const showDetails = !isQuiz || revealed;

  const setup = useCallback(() => {
    const c = canvasRef.current; if (!c) return;
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr; c.height = rect.height * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 11; ctx.strokeStyle = "#801d5c";
  }, []);
  useEffect(() => { setup(); const onR = () => setup(); window.addEventListener("resize", onR); return () => window.removeEventListener("resize", onR); }, [setup]);

  const clear = useCallback(() => { const c = canvasRef.current; if (!c) return; const ctx = c.getContext("2d"); ctx.clearRect(0, 0, c.width, c.height); setStrokes(0); }, []);
  useEffect(() => { clear(); }, [activeIdx, tmode, chart, clear]);

  const pos = (e) => { const c = canvasRef.current; const rect = c.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e; return { x: p.clientX - rect.left, y: p.clientY - rect.top }; };
  const start = (e) => { e.preventDefault(); drawing.current = true; last.current = pos(e); setStrokes((s) => s + 1); };
  const move = (e) => { if (!drawing.current) return; e.preventDefault(); const ctx = canvasRef.current.getContext("2d"); const p = pos(e); ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); last.current = p; };
  const end = () => { drawing.current = false; };

  const nextQuiz = () => { setRevealed(false); clear(); setQIdx((prev) => { let n; do { n = Math.floor(Math.random() * set.length); } while (n === prev && set.length > 1); return n; }); };
  const grade = (ok) => { setScore((s) => { const streak = ok ? s.streak + 1 : 0; return { right: s.right + (ok ? 1 : 0), total: s.total + 1, streak, best: Math.max(s.best, streak) }; }); nextQuiz(); };
  const switchMode = (m) => { if (m === tmode) return; setTmode(m); setRevealed(false); clear(); if (m === "quiz") setQIdx(Math.floor(Math.random() * set.length)); };
  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 6, background: T.panelHi, border: `1px solid ${T.line}`, padding: 5, borderRadius: 12, marginBottom: 14 }}>
        {[["practice", "Practice"], ["quiz", "Quiz"]].map(([k, label]) => (
          <button key={k} className="tap" onClick={() => switchMode(k)} style={{ flex: 1, border: "none", borderRadius: 8, padding: "8px 4px", fontSize: 12.5, fontWeight: 600, color: tmode === k ? "#fff" : T.textDim, background: tmode === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ background: T.panelHi, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px", marginBottom: 14, fontSize: 12.5, lineHeight: 1.7 }}>
        <b style={{ color: T.gold }}>Golden rules of kana handwriting</b>
        <div style={{ color: T.textDim, marginTop: 5 }}>
          1. Write left → right, top → bottom.<br />
          2. Horizontal strokes go left → right.<br />
          3. Vertical strokes go top → bottom.<br />
          4. Follow the printed stroke order — it keeps the shape balanced.
        </div>
      </div>

      {isQuiz && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
          <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
          <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
          <Stat label="Best" value={score.best} color={T.green} />
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", gap: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          {isQuiz && !revealed && (
            <div style={{ fontSize: 11, color: T.terra, fontWeight: 700, letterSpacing: 0.4, marginBottom: 3 }}>WRITE THIS KANA FROM MEMORY</div>
          )}
          {showDetails ? (
            <>
              <div style={{ fontSize: 16, color: T.text, fontWeight: 600 }}>{kana[1]}</div>
              {kana[2] && <div style={{ fontSize: 12, color: T.textDim, marginTop: 2 }}>{kana[2]}</div>}
              {sk && <div style={{ fontSize: 12.5, color: T.gold, marginTop: 5, lineHeight: 1.5 }}>✍️ {sk[0]} stroke{sk[0] > 1 ? "s" : ""}{sk[1] ? ` · ${sk[1]}` : ""}</div>}
            </>
          ) : (
            <div style={{ fontSize: 16, color: T.text, fontWeight: 600 }}>Listen, then write it.</div>
          )}
        </div>
        <Speaker text={kana[0]} color={T.terra} />
        {!isQuiz && <div style={{ fontSize: 12, color: T.textDim }}>{(idx % set.length) + 1}/{set.length}</div>}
      </div>

      <div style={{ position: "relative", width: "100%", aspectRatio: "1 / 1", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, overflow: "hidden", boxShadow: "0 14px 36px rgba(128,29,92,.10)" }}>
        {guideOn && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: jaFont, fontSize: "min(58vw, 320px)", color: T.terra, opacity: 0.22, pointerEvents: "none", userSelect: "none", lineHeight: 1 }}>
            {kana[0]}
          </div>
        )}
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, borderTop: `2px dashed ${T.line}`, pointerEvents: "none" }} />
        <div style={{ position: "absolute", top: 0, bottom: 0, left: "50%", borderLeft: `2px dashed ${T.line}`, pointerEvents: "none" }} />
        <canvas ref={canvasRef} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }} />
      </div>

      {!isQuiz ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => setIdx((i) => (i - 1 + set.length) % set.length)} style={ctrlBtn(false)}>‹ Prev</button>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>Clear</button>
          <button className="tap" onClick={() => setShowGuide((g) => !g)} style={ctrlBtn(showGuide)}>{showGuide ? "Hide guide" : "Show guide"}</button>
          <button className="tap" onClick={() => setIdx((i) => (i + 1) % set.length)} style={ctrlBtn(true)}>Next ›</button>
        </div>
      ) : !revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>Clear</button>
          <button className="tap" onClick={nextQuiz} style={ctrlBtn(false)}>Skip</button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>Reveal answer</button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => grade(false)} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${T.red}`, background: `${T.red}14`, color: T.text }}>Practice again</button>
          <button className="tap" onClick={() => grade(true)} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff" }}>Got it ✓</button>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>
        {!isQuiz ? (
          <>Trace over the faint guide following the ✍️ stroke order. Tap “Hide guide” to test yourself from memory.</>
        ) : !revealed ? (
          <>Picture the kana, write it from memory, then tap <b style={{ color: T.text }}>Reveal answer</b> to check the shape. Tap 🔊 to hear it.</>
        ) : (
          <>Compare your writing to the guide. Be honest — did you get the <b style={{ color: T.text }}>shape and stroke order</b> right?</>
        )}
      </div>
    </div>
  );
}

function ctrlBtn(active) {
  return { flex: 1, padding: "11px 4px", borderRadius: 12, fontSize: 12.5, fontWeight: 600, cursor: "pointer", border: active ? "none" : `1px solid ${T.line}`, background: active ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel, color: active ? "#fff" : T.text };
}

/* ===================== APP ===================== */
/* ===================== KANJI VIEW (JLPT N5–N1) ===================== */
function kanjiSpeak(k) {
  if (k.exJa) return k.exJa;
  if (k.kun && k.kun !== "—") { const f = k.kun.split("・")[0].replace(/[()]/g, ""); if (f) return f; }
  if (k.on && k.on !== "—") return k.on.split("・")[0];
  return k.char;
}

function makeKanjiQ(answer, pool) {
  const others = shuffle(pool.filter((k) => k.char !== answer.char)).slice(0, 3);
  // if a level is tiny, pad from the global set
  let distractors = others;
  if (distractors.length < 3) {
    const extra = shuffle(KANJI.filter((k) => k.char !== answer.char && !others.includes(k))).slice(0, 3 - distractors.length);
    distractors = [...distractors, ...extra];
  }
  return { answer, options: shuffle([answer, ...distractors]) };
}

function KanjiView({ kanjiState, setKanji }) {
  const ks = kanjiState || {};
  const level = ks.level || "N5";
  const learned = ks.learned || {};
  const setLevel = (lv) => setKanji({ ...ks, level: lv });
  const markLearned = (char, val) => {
    const next = { ...learned };
    if (val) next[char] = true; else delete next[char];
    setKanji({ ...ks, learned: next });
  };

  const [mode, setMode] = useState("browse"); // browse | study | quiz
  const list = KANJI_BY_LEVEL[level] || [];
  const learnedCount = list.filter((k) => learned[k.char]).length;

  return (
    <div className="fade" style={{ paddingTop: 6 }}>
      {/* JLPT level selector */}
      <div style={{ display: "flex", gap: 5, marginBottom: 12 }}>
        {JLPT_LEVELS.map((lv) => (
          <button key={lv} className="tap" onClick={() => setLevel(lv)} style={{ flex: 1, border: `1px solid ${level === lv ? T.gold : T.line}`, borderRadius: 11, padding: "10px 2px", fontSize: 13, fontWeight: 800, letterSpacing: 0.5, color: level === lv ? "#fff" : T.textDim, background: level === lv ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel }}>
            {lv}
          </button>
        ))}
      </div>

      <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 18, padding: "14px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 12.5, color: T.textDim, lineHeight: 1.5 }}>{JLPT_DESC[level]}</div>
        <div style={{ margin: "10px 0 6px" }}><Bar pct={list.length ? learnedCount / list.length : 0} /></div>
        <div style={{ fontSize: 12, color: T.textDim }}>{learnedCount} / {list.length} kanji marked learned</div>
      </div>

      {/* mode tabs */}
      <div style={{ display: "flex", gap: 6, background: T.panelHi, border: `1px solid ${T.line}`, padding: 5, borderRadius: 13, marginBottom: 16 }}>
        {[["browse", "📖 Browse"], ["study", "🎓 Study"], ["quiz", "✨ Quiz"], ["trace", "✍️ Trace"]].map(([k, label]) => (
          <button key={k} className="tap" onClick={() => setMode(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 1px", fontSize: 11.5, fontWeight: 600, color: mode === k ? "#fff" : T.textDim, background: mode === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
            {label}
          </button>
        ))}
      </div>

      {mode === "browse" && <KanjiBrowse list={list} learned={learned} onMark={markLearned} />}
      {mode === "study" && <KanjiStudy key={level} list={list} learned={learned} onMark={markLearned} />}
      {mode === "quiz" && <KanjiQuiz key={level} list={list} level={level} best={ks.best || 0} onBest={(b) => setKanji({ ...ks, best: Math.max(ks.best || 0, b) })} />}
      {mode === "trace" && <KanjiTrace key={level} list={list} />}
    </div>
  );
}

}

/* ---- Study: flashcards through the level ---- */

  if (!list.length) return <div style={{ color: T.textDim, textAlign: "center", padding: 30 }}>No kanji in this level yet.</div>;

    <div className="fade">
      <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>

      <div className="pop" key={k.char} onClick={() => setRevealed(true)} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)", cursor: revealed ? "default" : "pointer", minHeight: 240 }}>

      {!revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => setIdx((i) => (i - 1 + list.length) % list.length)} style={ctrlBtn(false)}>‹ Prev</button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>Reveal</button>
          <button className="tap" onClick={advance} style={ctrlBtn(false)}>Next ›</button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={advance} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${T.line}`, background: T.panel, color: T.text }}>Still learning</button>
          <button className="tap" onClick={() => { onMark(k.char, true); advance(); }} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff" }}>Got it ✓</button>
        </div>
      )}

        {(idx % list.length) + 1} of {list.length}{learned[k.char] ? " · already learned" : ""}
