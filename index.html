/* ---- Study: flashcards through the level ---- */
function KanjiStudy({ list, learned, onMark }) {
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  if (!list.length) return <div style={{ color: T.textDim, textAlign: "center", padding: 30 }}>No kanji in this level yet.</div>;
  const k = list[idx % list.length];
  const advance = () => { setRevealed(false); setIdx((i) => (i + 1) % list.length); };

  return (
    <div className="fade">
      <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ height: "100%", width: `${((idx % list.length) / list.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
      </div>

      <div className="pop" key={k.char} onClick={() => setRevealed(true)} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)", cursor: revealed ? "default" : "pointer", minHeight: 240 }}>
        <div style={{ fontFamily: jaFont, fontSize: 104, color: T.text, lineHeight: 1.05 }}>{k.char}</div>
        {!revealed ? (
          <div style={{ fontSize: 13, color: T.textDim, marginTop: 14 }}>Tap to reveal the reading & meaning</div>
        ) : (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 700, color: T.gold }}>{k.meaning}</div>
            <div style={{ fontSize: 13, color: T.textDim, marginTop: 6, lineHeight: 1.6 }}>
              <span style={{ color: T.terra, fontWeight: 700 }}>On</span> {k.on}　·　<span style={{ color: T.goldSoft, fontWeight: 700 }}>Kun</span> {k.kun}
            </div>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, marginTop: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 12, padding: "8px 12px" }}>
              {k.exJa && <span style={{ fontFamily: jaFont, fontSize: 18 }}>{k.exJa}</span>}
              {k.exJa && <span style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 13 }}>{k.exKana}</span>}
              <Speaker text={kanjiSpeak(k)} size={16} color={T.terra} />
            </div>
            {k.exEn && <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 6 }}>{k.exEn}</div>}
          </div>
        )}
      </div>

      {!revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => setIdx((i) => (i - 1 + list.length) % list.length)} style={ctrlBtn(false)}>‹ Prev</button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>Reveal</button>
          <button className="tap" onClick={advance} style={ctrlBtn(false)}>Next ›</button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={advance} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${T.line}`, background: T.panel, color: T.text }}>Still learning</button>
          <button className="tap" onClick={() => { onMark(k.char, true); advance(); }} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff" }}>Got it ✓</button>
        </div>
      )}
      <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>
        {(idx % list.length) + 1} of {list.length}{learned[k.char] ? " · already learned" : ""}
      </div>
    </div>
  );
}

/* ---- Quiz: kanji ⇄ meaning multiple choice ---- */
function KanjiQuiz({ list, level, best, onBest }) {
  const [dir, setDir] = useState("k2m"); // k2m: kanji→meaning · m2k: meaning→kanji
  const [q, setQ] = useState(() => (list.length ? makeKanjiQ(list[Math.floor(Math.random() * list.length)], list) : null));
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best });
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);

  if (!list.length || !q) return <div style={{ color: T.textDim, textAlign: "center", padding: 30 }}>No kanji in this level yet.</div>;

  const showKanji = dir === "k2m";
  const next = () => { setPicked(null); setQ(makeKanjiQ(list[Math.floor(Math.random() * list.length)], list)); };
  const choose = (opt) => {
    if (picked) return;
    const ok = opt.char === q.answer.char;
    speak(kanjiSpeak(q.answer));
    setPicked(opt);
    setScore((s) => {
      const streak = ok ? s.streak + 1 : 0;
      const nb = Math.max(s.best, streak);
      if (nb > s.best) onBest(nb);
      return { right: s.right + (ok ? 1 : 0), total: s.total + 1, streak, best: nb };
    });
    timer.current = setTimeout(next, 1000);
  };
  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;
  const meaning = (k) => k.meaning.split(",")[0];

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
        <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
        <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
        <Stat label="Best" value={score.best} color={T.green} />
      </div>

      <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
        <button className="tap" onClick={() => { setDir((d) => (d === "k2m" ? "m2k" : "k2m")); setPicked(null); }} style={{ border: `1px solid ${T.line}`, background: T.panelHi, color: T.gold, borderRadius: 20, padding: "7px 14px", fontSize: 12.5, fontWeight: 600 }}>
          {showKanji ? "See kanji → pick meaning" : "See meaning → pick kanji"} ⇄
        </button>
      </div>

      <div className="pop" key={q.answer.char + dir} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "28px 20px", textAlign: "center", boxShadow: "0 14px 36px rgba(128,29,92,.10)", marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>{showKanji ? "What does this kanji mean?" : "Which kanji means this?"}</div>
        {showKanji ? (
          <div style={{ fontFamily: jaFont, fontSize: 88, color: T.text, lineHeight: 1 }}>{q.answer.char}</div>
        ) : (
          <div style={{ fontFamily: displayFont, fontSize: 32, color: T.gold, fontWeight: 700 }}>{meaning(q.answer)}</div>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {q.options.map((opt, i) => {
          let bg = T.panel, border = T.line, col = T.text;
          if (picked) {
            const isCorrect = opt.char === q.answer.char;
            const isPicked = opt.char === picked.char;
            if (isCorrect) { bg = `${T.green}1a`; border = T.green; col = T.gold; }
            else if (isPicked) { bg = `${T.red}1a`; border = T.red; col = T.red; }
          }
          return (
            <button key={i} className="tap" onClick={() => choose(opt)} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: showKanji ? "14px 8px" : "16px 8px", cursor: "pointer", minHeight: 64, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {showKanji ? (
                <span style={{ fontFamily: displayFont, fontSize: 17, color: col, fontWeight: 600, textAlign: "center" }}>{meaning(opt)}</span>
              ) : (
                <span style={{ fontFamily: jaFont, fontSize: 40, color: col }}>{opt.char}</span>
              )}
            </button>
          );
        })}
      </div>

      {picked && (
        <div className="fade" style={{ textAlign: "center", marginTop: 16, fontSize: 14 }}>
          <span style={{ fontFamily: jaFont, fontSize: 28, color: T.text }}>{q.answer.char}</span>
          <span style={{ color: T.textDim }}> = </span>
          <span style={{ color: T.gold, fontWeight: 700 }}>{q.answer.meaning}</span>
          {q.answer.exJa && (
            <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 4 }}>
              <span style={{ fontFamily: jaFont }}>{q.answer.exJa}</span> · {q.answer.exKana} · {q.answer.exEn}
            </div>
          )}
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 18, lineHeight: 1.6 }}>
        Tap an answer — you'll hear an example word and the next question loads automatically.
      </div>
    </div>
  );
}

/* ---- Kanji handwriting trace (practice + quiz) ---- */
function KanjiTrace({ list }) {
  const [tmode, setTmode] = useState("practice"); // practice | quiz
  const [idx, setIdx] = useState(0);
  const [showGuide, setShowGuide] = useState(true);
  const [qIdx, setQIdx] = useState(() => (list.length ? Math.floor(Math.random() * list.length) : 0));
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPt = useRef(null);
  const [, setStrokes] = useState(0);

  const isQuiz = tmode === "quiz";
  const activeIdx = list.length ? (isQuiz ? qIdx : idx) % list.length : 0;
  const k = list[activeIdx];
  const guideOn = isQuiz ? revealed : showGuide;
  const showDetails = !isQuiz || revealed;

  const setup = useCallback(() => {
    const c = canvasRef.current; if (!c) return;
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr; c.height = rect.height * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 11; ctx.strokeStyle = "#801d5c";
  }, []);
  useEffect(() => { setup(); const onR = () => setup(); window.addEventListener("resize", onR); return () => window.removeEventListener("resize", onR); }, [setup]);

  const clear = useCallback(() => { const c = canvasRef.current; if (!c) return; const ctx = c.getContext("2d"); ctx.clearRect(0, 0, c.width, c.height); setStrokes(0); }, []);
  useEffect(() => { clear(); }, [activeIdx, tmode, clear]);

  const pos = (e) => { const c = canvasRef.current; const rect = c.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e; return { x: p.clientX - rect.left, y: p.clientY - rect.top }; };
  const start = (e) => { e.preventDefault(); drawing.current = true; lastPt.current = pos(e); setStrokes((s) => s + 1); };
  const move = (e) => { if (!drawing.current) return; e.preventDefault(); const ctx = canvasRef.current.getContext("2d"); const p = pos(e); ctx.beginPath(); ctx.moveTo(lastPt.current.x, lastPt.current.y); ctx.lineTo(p.x, p.y); ctx.stroke(); lastPt.current = p; };
  const end = () => { drawing.current = false; };

  const nextQuiz = () => { setRevealed(false); clear(); setQIdx((prev) => { let n; do { n = Math.floor(Math.random() * list.length); } while (n === prev && list.length > 1); return n; }); };
  const grade = (ok) => { setScore((s) => { const streak = ok ? s.streak + 1 : 0; return { right: s.right + (ok ? 1 : 0), total: s.total + 1, streak, best: Math.max(s.best, streak) }; }); nextQuiz(); };
  const switchMode = (m) => { if (m === tmode) return; setTmode(m); setRevealed(false); clear(); if (m === "quiz") setQIdx(Math.floor(Math.random() * list.length)); };
  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;

  if (!list.length) return <div style={{ color: T.textDim, textAlign: "center", padding: 30 }}>No kanji in this level yet.</div>;

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 6, background: T.panelHi, border: `1px solid ${T.line}`, padding: 5, borderRadius: 12, marginBottom: 14 }}>
        {[["practice", "Practice"], ["quiz", "Quiz"]].map(([m, label]) => (
          <button key={m} className="tap" onClick={() => switchMode(m)} style={{ flex: 1, border: "none", borderRadius: 8, padding: "8px 4px", fontSize: 12.5, fontWeight: 600, color: tmode === m ? "#fff" : T.textDim, background: tmode === m ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ background: T.panelHi, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px", marginBottom: 14, fontSize: 12.5, lineHeight: 1.7 }}>
        <b style={{ color: T.gold }}>Golden rules of kanji handwriting</b>
        <div style={{ color: T.textDim, marginTop: 5 }}>
          1. Write left → right, top → bottom.<br />
          2. Horizontal strokes before crossing verticals.<br />
          3. Outer enclosures before what goes inside.<br />
          4. Keep the character balanced inside the box.
        </div>
      </div>

      {isQuiz && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
          <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
          <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
          <Stat label="Best" value={score.best} color={T.green} />
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", gap: 12, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          {isQuiz && !revealed && (
            <div style={{ fontSize: 11, color: T.terra, fontWeight: 700, letterSpacing: 0.4, marginBottom: 3 }}>WRITE THIS KANJI FROM MEMORY</div>
          )}
          {showDetails ? (
            <>
              <div style={{ fontSize: 16, color: T.text, fontWeight: 700 }}>{k.meaning}</div>
              <div style={{ fontSize: 12, color: T.textDim, marginTop: 3, lineHeight: 1.6 }}>
                <span style={{ color: T.terra, fontWeight: 700 }}>On</span> {k.on}　·　<span style={{ color: T.goldSoft, fontWeight: 700 }}>Kun</span> {k.kun}
              </div>
              {k.exJa && (
                <div style={{ fontSize: 12.5, color: T.gold, marginTop: 5 }}>
                  <span style={{ fontFamily: jaFont, fontSize: 15 }}>{k.exJa}</span> · {k.exKana} · {k.exEn}
                </div>
              )}
            </>
          ) : (
            <div style={{ fontSize: 14, color: T.text, fontWeight: 600 }}>Reading: <span style={{ color: T.gold }}>{k.meaning}</span></div>
          )}
        </div>
        <Speaker text={kanjiSpeak(k)} color={T.terra} />
        {!isQuiz && <div style={{ fontSize: 12, color: T.textDim }}>{activeIdx + 1}/{list.length}</div>}
      </div>

      <div style={{ position: "relative", width: "100%", aspectRatio: "1 / 1", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, overflow: "hidden", boxShadow: "0 14px 36px rgba(128,29,92,.10)" }}>
        <StrokeGuide char={k.char} show={guideOn} />
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, borderTop: `2px dashed ${T.line}`, pointerEvents: "none" }} />
        <div style={{ position: "absolute", top: 0, bottom: 0, left: "50%", borderLeft: `2px dashed ${T.line}`, pointerEvents: "none" }} />
        <canvas ref={canvasRef} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }} />
      </div>

      {!isQuiz ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => setIdx((i) => (i - 1 + list.length) % list.length)} style={ctrlBtn(false)}>‹ Prev</button>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>Clear</button>
          <button className="tap" onClick={() => setShowGuide((g) => !g)} style={ctrlBtn(showGuide)}>{showGuide ? "Hide guide" : "Show guide"}</button>
          <button className="tap" onClick={() => setIdx((i) => (i + 1) % list.length)} style={ctrlBtn(true)}>Next ›</button>
        </div>
      ) : !revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>Clear</button>
          <button className="tap" onClick={nextQuiz} style={ctrlBtn(false)}>Skip</button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>Reveal answer</button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={() => grade(false)} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${T.red}`, background: `${T.red}14`, color: T.text }}>Practice again</button>
          <button className="tap" onClick={() => grade(true)} style={{ flex: 1, padding: "12px 4px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff" }}>Got it ✓</button>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>
        {!isQuiz ? (
          <>Follow the numbered circles in order, drawing each stroke toward its arrow. Tap “Hide guide” to test yourself from memory.</>
        ) : !revealed ? (
          <>Picture the kanji for the meaning shown, write it from memory, then tap <b style={{ color: T.text }}>Reveal answer</b> to check.</>
        ) : (
          <>Compare your writing to the guide. Be honest — did you get the <b style={{ color: T.text }}>shape and proportions</b> right?</>
        )}
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(null);
  const [view, setView] = useState("home");
  const [practiceItems, setPracticeItems] = useState([]);
  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; }, [state]);

  useEffect(() => {
    let mounted = true;
    (async () => {
      const loaded = await loadState();
      let s = loaded || DEFAULT_STATE;
      if (s.daily?.date !== todayStr()) s = { ...s, daily: { date: todayStr(), reviews: 0, lessons: 0 } };
      s = { ...DEFAULT_STATE, ...s, settings: { ...DEFAULT_STATE.settings, ...(s.settings || {}) }, script: { ...DEFAULT_STATE.script, ...(s.script || {}) }, kanji: { ...DEFAULT_STATE.kanji, ...(s.kanji || {}) } };
      if (mounted) setState(s);
    })();
    return () => { mounted = false; };
  }, []);

  useEffect(() => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    return () => { if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const persist = useCallback((next) => { setState(next); saveState(next); }, []);
  const allItems = useMemo(() => [...ITEMS, ...((state && state.custom) || [])], [state]);

  const derived = useMemo(() => {
    if (!state) return null;
    const now = Date.now();
    const lvl = state.currentLevel;
    const pool = allItems.filter((it) => (it.custom || it.level <= lvl) && !state.progress[it.id]);
    const due = allItems.filter((it) => { const p = state.progress[it.id]; return p && p.due !== Infinity && p.due <= now; });
    const leechList = allItems.filter((it) => isLeech(state.progress[it.id]));
    const levelItems = ITEMS.filter((it) => it.level === lvl);
    const guru = levelItems.filter((it) => (state.progress[it.id]?.stage || 0) >= 5).length;
    const levelPct = levelItems.length ? guru / levelItems.length : 0;
    const stageCounts = {};
    allItems.forEach((it) => { const p = state.progress[it.id]; if (!p) return; const g = stageMeta(p.stage).group; stageCounts[g] = (stageCounts[g] || 0) + 1; });
    return { pool, due, leechList, levelPct, stageCounts };
  }, [state, allItems]);

  const streak = useMemo(() => {
    if (!state) return 0;
    let n = 0, day = todayStr();
    if (!state.history[day]) day = shiftDay(day, -1);
    while (state.history[day] > 0) { n++; day = shiftDay(day, -1); }
    return n;
  }, [state]);

  const commitLearn = useCallback((id) => {
    setState((s) => {
      const day = todayStr();
      const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
      const next = { ...s, progress: { ...s.progress, [id]: learnItem(Date.now()) }, daily: { ...daily, lessons: daily.lessons + 1 } };
      saveState(next);
      return next;
    });
  }, []);

  const grade = useCallback((id, correct, mode) => {
    const s = stateRef.current;
    const prog = s.progress[id];
    if (!prog) return null;
    const now = Date.now();
    let cur = s.currentLevel;
    let leveled = null;
    let np;
    if (mode === "practice") {
      np = { ...prog, correct: prog.correct + (correct ? 1 : 0), wrong: prog.wrong + (correct ? 0 : 1), recentWrong: correct ? 0 : (prog.recentWrong || 0) + 1, lastReviewed: now };
    } else {
      np = reviewSchedule(prog, correct, now);
      const progress0 = { ...s.progress, [id]: np };
      const levelItems = ITEMS.filter((it) => it.level === cur);
      const guru = levelItems.filter((it) => (progress0[it.id]?.stage || 0) >= 5).length;
      if (levelItems.length && guru / levelItems.length >= 0.9 && cur < MAX_LEVEL) { cur += 1; leveled = cur; }
    }
    const day = todayStr();
    const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
    const next = {
      ...s, currentLevel: cur,
      progress: { ...s.progress, [id]: np },
      daily: { ...daily, reviews: daily.reviews + (mode === "practice" ? 0 : 1) },
      history: { ...s.history, [day]: (s.history[day] || 0) + 1 },
    };
    persist(next);
    return leveled;
  }, [persist]);

  const startPractice = useCallback((itemsOrLeech) => {
    const items = itemsOrLeech === "leeches" ? (derived ? derived.leechList : []) : itemsOrLeech;
    if (items && items.length) { setPracticeItems(items); setView("practice"); }
  }, [derived]);

  if (!state || !derived)
    return <div style={{ minHeight: "100vh", background: T.bg, color: T.textDim, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: uiFont }}>Loading…</div>;

  const tabs = [
    ["home", "Home"],
    ["lessons", "Lessons", derived.pool.length],
    ["reviews", "Reviews", derived.due.length],
    ["script", "Script"],
    ["kanji", "Kanji"],
    ["items", "Items"],
    ["stats", "Stats"],
  ];

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(1100px 560px at 50% -10%, ${T.bg2}, ${T.bg})`, color: T.text, fontFamily: uiFont, paddingBottom: 40 }}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }
        @keyframes pop { from { opacity:0; transform: scale(.97);} to {opacity:1; transform:none;} }
        @keyframes pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; } 50% { transform: translate(-50%,-50%) scale(1.55); opacity:.45; } }
        .tap { transition: transform .12s ease, background .15s ease, border-color .15s ease; cursor: pointer; }
        .tap:active { transform: scale(.97); }
        .fade { animation: fadeUp .35s ease both; }
        .pop { animation: pop .25s ease both; }
        input, button, select { font-family: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: ${T.line}; border-radius: 8px; }
      `}</style>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "22px 18px 10px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: jaFont, fontSize: 22, color: "#fff", fontWeight: 700, boxShadow: "0 4px 14px rgba(128,29,92,.22)" }}>あ</div>
          <div>
            <div style={{ fontFamily: displayFont, fontSize: 19 }}>Nihongo <span style={{ color: T.goldSoft }}>SRS</span></div>
            <div style={{ fontSize: 11.5, color: T.textDim, marginTop: -1 }}>Japanese · level {state.currentLevel}</div>
          </div>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <div style={{ fontSize: 11, color: T.textDim }}>streak</div>
            <div style={{ fontSize: 16, color: T.gold, fontWeight: 700 }}>{streak}🔥</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 3, marginTop: 16, background: T.panel, padding: 4, borderRadius: 13, border: `1px solid ${T.line}` }}>
          {tabs.map(([k, label, n]) => (
            <button key={k} className="tap" onClick={() => setView(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 1px", fontSize: 11, fontWeight: 600, position: "relative", color: view === k ? "#fff" : T.textDim, background: view === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
              {label}
              {n > 0 && view !== k && (<span style={{ position: "absolute", top: 5, right: "50%", marginRight: -16, width: 6, height: 6, borderRadius: 999, background: T.terra }} />)}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "8px 18px" }}>
        {view === "home" && (
          <HomeView state={state} level={state.currentLevel} levelPct={derived.levelPct}
            lessons={derived.pool.length} reviews={derived.due.length} leeches={derived.leechList.length}
            stageCounts={derived.stageCounts} streak={streak} onGo={setView}
            onTrouble={() => startPractice("leeches")}
            onSetting={(patch) => persist({ ...state, settings: { ...state.settings, ...patch } })}
            onReset={() => { persist({ ...DEFAULT_STATE, custom: state.custom, settings: state.settings, script: state.script, kanji: state.kanji, daily: { date: todayStr(), reviews: 0, lessons: 0 } }); setView("home"); }} />
        )}
        {view === "lessons" && (<LearnSession pool={derived.pool} batch={state.settings.lessonBatch} onLearn={commitLearn} onGrade={grade} onExit={() => setView("home")} />)}
        {view === "reviews" && <TypedQuiz items={derived.due} mode="srs" onGrade={grade} onExit={() => setView("home")} title="Reviews" />}
        {view === "practice" && <TypedQuiz items={practiceItems} mode="practice" onGrade={grade} onExit={() => setView("items")} title="Practice" />}
        {view === "script" && <ScriptView scriptState={state.script} setScript={(next) => persist({ ...state, script: next })} />}
        {view === "kanji" && <KanjiView kanjiState={state.kanji} setKanji={(next) => persist({ ...state, kanji: next })} />}
        {view === "items" && (<ItemsView allItems={allItems} state={state} level={state.currentLevel} leeches={derived.leechList.length} onAdd={(c) => persist({ ...state, custom: [...state.custom, c] })} onStartPractice={startPractice} />)}
        {view === "stats" && <StatsView state={state} allItems={allItems} level={state.currentLevel} streak={streak} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
